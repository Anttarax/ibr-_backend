name: APP1 CI

on:
  workflow_dispatch:

env:
  ACR_NAME: ibruacr
  IMAGE_NAME: app1

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------
      # 🔍 SONARQUBE SETUP
      # ---------------------------

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: SonarQube Begin
        run: |
          dotnet sonarscanner begin \
            /o:"anttarax" \
            /k:"Anttarax_ibr-_backend" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      # 🔨 BUILD (Sonar itt figyel)
      - name: Build
        run: dotnet build

      - name: SonarQube End
        run: |
          dotnet sonarscanner end \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      # ---------------------------
      # 🐳 DOCKER + ACR
      # ---------------------------

      - name: Azure Login (SP)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.SP_SANDBOX_DNA }}
          enable-AzPSSession: false

      - name: Compute ACR_LOGIN_SERVER
        run: |
          echo "ACR_LOGIN_SERVER=${ACR_NAME}.azurecr.io" >> $GITHUB_ENV

      - name: Compute IMAGE_TAG
        run: |
          echo "IMAGE_TAG=${{ github.run_id }}" >> $GITHUB_ENV

      - name: Debug build variables
        run: |
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER"
          echo "IMAGE_NAME=$IMAGE_NAME"
          echo "IMAGE_TAG=$IMAGE_TAG"

      - name: ACR Login
        run: az acr login --name "$ACR_NAME"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}

      - name: List files
        run: |
          pwd
          ls -al

      - name: Build and Push to ACR
        uses: docker/build-push-action@v6
        with:
          context: app1
          file: app1/dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Write build metadata
        run: |
          echo "IMAGE_NAME=$IMAGE_NAME" > build-info.env
          echo "IMAGE_TAG=$IMAGE_TAG" >> build-info.env
          echo "ACR_NAME=$ACR_NAME" >> build-info.env